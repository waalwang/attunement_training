# Attunement Training Config
# --------------------------

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  max_length: 2048

model_presets:
  qwen-1.5b:
    name: "Qwen/Qwen2.5-1.5B-Instruct"
  qwen-7b:
    name: "Qwen/Qwen2.5-7B-Instruct"
  qwen-14b:
    name: "Qwen/Qwen2.5-14B-Instruct"
  llama-8b:
    name: "meta-llama/Llama-3.1-8B-Instruct"

data:
  sft_chain_dir: "./data"
  test_split: 0.05
  seed: 42
  min_chain_depth: 3
  min_total_score: 0.0
  weight_beta: 0.3         # upvote score influence on weight (vs attunement)
  weight_mode: "gate_amplify"  # gate_amplify | attunement_only | additive

# QLoRA config (used only when full_finetune=false)
qlora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

# Hardware profiles
profiles:
  local:
    # TITAN RTX 24GB -- eval/prototyping only
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 1
    bf16: false
    fp16: true
    full_finetune: false
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

  cloud:
    # QLoRA on 7B, RTX PRO 6000 WS 96GB
    per_device_train_batch_size: 8
    gradient_accumulation_steps: 2
    bf16: true
    fp16: false
    full_finetune: false
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

  cloud_full:
    # Full FT 7B, RTX PRO 6000 WS 96GB
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    bf16: true
    fp16: false
    full_finetune: true
    attn_implementation: "sdpa"
    gradient_checkpointing: true
    max_length: 2048

# QLoRA config for DPO (larger rank for preference learning)
dpo_qlora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  task_type: "CAUSAL_LM"

# DPO training
dpo:
  data_dir: "./data/dpo_unweighted_sft_final.parquet"
  beta: 0.1
  loss_type: "sigmoid"            # sigmoid | ipo | hinge
  output_dir: "outputs/dpo"
  learning_rate: 5.0e-6
  num_train_epochs: 1
  max_prompt_length: 1024
  min_score_delta: 0.0
  precompute_ref_log_probs: false  # auto-enabled for full FT
  chosen_weighting: false          # per-example weighting from chosen quality
  weight_beta: 0.3
  weight_mode: "gate_amplify"
  run_name: "qwen2.5-7b-dpo"

# Weighted SFT training
training:
  output_dir: "outputs/sft"
  num_train_epochs: 2
  learning_rate: 2.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine_with_restarts"
  logging_steps: 10
  save_steps: 2000
  eval_steps: 2000
  eval_strategy: "steps"
  save_total_limit: 2
  report_to: "wandb"
  run_name: "qwen2.5-7b-weighted-sft"
  max_length: 2048
  dataset_num_proc: 16
